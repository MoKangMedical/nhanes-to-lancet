<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NHANES to Lancet{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3h18v18H3z"/>
                    <path d="M3 9h18"/>
                    <path d="M9 3v18"/>
                </svg>
                NHANES to Lancet
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">首页</a>
                <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">项目</a>
                <a href="/projects/new" class="nav-link btn-primary">新建分析</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>NHANES to Lancet | AI驱动的流行病学研究平台 | 数据来源: CDC NHANES</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
